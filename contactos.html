<h1>Contactate con nosotros!</h1>
<div class="input-container">
    <input id="nombre" type="text" placeholder="Nombre" class="form-control mb-3">
    <input id="email" type="email" placeholder="Email" class="form-control mb-3">
    <textarea id="mensaje" placeholder="Mensaje" class="form-control mb-3"></textarea>
    <button type="button" class="btn btn-primary" style="height: 30%; width: 100%;" onclick="enviarFormulario()">Enviar</button>
    <div id="resultado" class="mt-3 text-success"></div>
</div>
<script type="text/javascript">
    function enviarFormulario() {
        var nombre = document.getElementById('nombre').value;
        var email = document.getElementById('email').value;
        var mensaje = document.getElementById('mensaje').value;
        var textoResultado = "Hola " + nombre + ", tu mensaje \"" + mensaje + "\" ha sido enviado correctamente. Nos pondremos en contacto contigo a través de tu email: " + email;
        document.getElementById('resultado').textContent = textoResultado;
    }
</script>
